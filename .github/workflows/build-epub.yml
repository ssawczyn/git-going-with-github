name: Build EPUB, Word, and BRF

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'epub/metadata.yaml'
      - 'epub/epub.css'
      - 'epub/pdf.css'
      - 'scripts/build-epub.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build EPUB and Word
        run: node scripts/build-epub.js

      - name: Install liblouis (braille translator — no TTS needed)
        run: sudo apt-get install -y liblouisutdml-bin

      - name: Convert EPUB to BRF (Braille — no TTS required)
        continue-on-error: true
        run: |
          mkdir -p epub/brf
          # Extract HTML from EPUB, then translate to BRF using liblouis (pure text→braille, zero TTS)
          pandoc epub/git-going-with-github.epub -f epub -t html5 -o /tmp/book.html
          file2brl /tmp/book.html epub/brf/git-going-with-github.brf || echo "BRF conversion failed"
          ls -lh epub/brf/ || echo "No BRF output produced"

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-going-with-github-epub
          path: epub/git-going-with-github.epub
          retention-days: 90

      - name: Upload Word artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-going-with-github-word
          path: epub/git-going-with-github.docx
          retention-days: 90

      - name: Upload BRF artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-going-with-github-brf
          path: epub/brf/
          if-no-files-found: warn
          retention-days: 90
